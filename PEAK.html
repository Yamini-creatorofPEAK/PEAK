<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PEAK – Food Intelligence</title>

<style>

:root{
  --bg:#0e0e13;
  --card:#181824;
  --accent:#7c4dff;
  --green:#00e676;
  --text:#ffffff;
  --muted:#aeb4c2;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;

  background:
  linear-gradient(rgba(8,8,18,.88),rgba(8,8,18,.92)),
  url('https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/e7ff3e77-4155-4b44-bcb4-61c77e1b5384.jpg');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;
  overflow-x:hidden;
}

/* Glow */

body::before{
  content:'';
  position:fixed;
  width:500px;
  height:500px;

  background:
  radial-gradient(circle,#7c4dff55,transparent 70%);

  top:-120px;
  left:-120px;

  animation:glowMove 8s infinite ease-in-out;

  z-index:-1;
}

@keyframes glowMove{

  0%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(30px);
  }

  100%{
    transform:translateY(0);
  }
}

/* Screens */

.screen{
  display:none;
  min-height:100vh;
  padding:20px;
  animation:fade .5s ease;
}

.active{
  display:block;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(15px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* LOGO */

.logo{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;

  margin-top:15px;
  margin-bottom:20px;
}

.logo img{

  width:240px;
  max-width:90%;

  display:block;

  border-radius:28px;

  object-fit:cover;

  background:rgba(255,255,255,.03);

  border:1px solid rgba(255,255,255,.06);

  box-shadow:
  0 0 25px rgba(124,77,255,.25),
  0 10px 40px rgba(0,0,0,.45);

  animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* Cards */

.card{

  background:rgba(24,24,36,.88);

  backdrop-filter:blur(14px);

  border-radius:28px;

  padding:24px;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:
  0 15px 50px rgba(0,0,0,.35);
}

/* Mascot */

.mascot{
  font-size:70px;
  text-align:center;
  margin-bottom:15px;

  animation:bounce 3s infinite ease-in-out;
}

@keyframes bounce{

  0%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0);
  }
}

/* Message */

.message{
  min-height:85px;
  line-height:1.8;
  color:var(--muted);
  text-align:center;
  font-size:17px;
}

/* Buttons */

.btn{

  width:100%;

  padding:16px;

  margin-top:14px;

  border:none;
  border-radius:18px;

  font-size:16px;
  font-weight:700;

  cursor:pointer;

  transition:.3s;

  color:white;
}

.btn:hover{
  transform:scale(1.03);
}

.primary{

  background:
  linear-gradient(45deg,#7c4dff,#9f80ff);

  box-shadow:
  0 0 20px rgba(124,77,255,.45);
}

/* Preview Images */

.preview{

  width:100%;

  margin-top:16px;

  border-radius:22px;

  display:block;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:
  0 10px 30px rgba(0,0,0,.4);

  animation:floatImg 4s ease-in-out infinite;
}

@keyframes floatImg{

  0%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-6px);
  }

  100%{
    transform:translateY(0);
  }
}

/* Progress */

.progress{

  width:100%;
  height:7px;

  background:#2d2d3d;

  border-radius:30px;

  overflow:hidden;

  margin-bottom:20px;
}

.progress-bar{

  height:100%;
  width:0%;

  background:
  linear-gradient(90deg,#7c4dff,#00e676);

  transition:.4s;
}

/* Result */

.result-box{

  padding:24px;

  border-radius:24px;

  text-align:center;

  margin-top:18px;
}

.result-good{

  background:rgba(0,200,83,.12);

  border:1px solid rgba(0,255,128,.3);
}

.result-limit{

  background:rgba(255,165,0,.12);

  border:1px solid rgba(255,165,0,.3);
}

.result-avoid{

  background:rgba(255,0,0,.12);

  border:1px solid rgba(255,0,0,.3);
}

#resultTitle{
  font-size:42px;
  margin-bottom:10px;
}

/* Guide */

.guide{
  margin-top:22px;
}

.guide-card{

  opacity:0;

  transform:translateY(25px);

  animation:showCard .7s forwards;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);

  padding:16px;

  border-radius:18px;

  margin-top:12px;
}

.guide-card:nth-child(1){
  animation-delay:.3s;
}

.guide-card:nth-child(2){
  animation-delay:.8s;
}

.guide-card:nth-child(3){
  animation-delay:1.3s;
}

@keyframes showCard{

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.guide-card h3{
  margin-bottom:8px;
}

/* Mobile */

@media(max-width:600px){

  .logo img{
    width:190px;
  }

  .message{
    font-size:15px;
  }

  .mascot{
    font-size:58px;
  }
}

</style>
</head>

<body>

<!-- HOME -->

<div class="screen active" id="home">

  <!-- YOUR LOGO -->

  <div class="logo">
    <img
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/e7ff3e77-4155-4b44-bcb4-61c77e1b5384.jpg"
    alt="PEAK Logo">
  </div>

  <div class="card">

    <div class="mascot">
      🌿
    </div>

    <div class="message" id="homeText"></div>

    <!-- Preview Images -->

    <img class="preview"
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/65610178-793d-4306-908c-f3341f20e95e.jpg">

    <img class="preview"
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/acf93341-7359-472e-8ca8-e7354fab6747.jpg">

    <button class="btn primary" onclick="start()">
      🚀 Start Food Check
    </button>

  </div>

</div>

<!-- QUESTIONS -->

<div class="screen" id="questions">

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="card">

    <div class="mascot" id="mascotQ">
      🍔
    </div>

    <div class="message" id="questionText"></div>

    <button class="btn primary" onclick="answer(1)">
      ✅ Yes
    </button>

    <button class="btn primary" onclick="answer(0)">
      ❌ No
    </button>

  </div>

</div>

<!-- RESULT -->

<div class="screen" id="result">

  <div class="card">

    <div class="mascot" id="mascotR">
      🌟
    </div>

    <img class="preview"
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/3d09486d-5e0b-431e-81d5-79c15d679030.jpg">

    <img class="preview"
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/45790766-9f5a-44f2-9e98-4c775d7f6400.jpg">

    <img class="preview"
    src="https://i.supaimg.com/2a1ec0a4-961a-4ad4-9ec0-c13b367ba0d2/b31ce7cf-99da-4e44-9525-1baf549b8bad.jpg">

    <div class="result-box" id="resultBox">

      <h1 id="resultTitle"></h1>

      <p id="resultMsg"></p>

    </div>

    <!-- Scanner Guide -->

    <div class="guide">

      <div class="guide-card">

        <h3>🍭 Scanner 1 — Snacks</h3>

        <p>
          Check sugar levels, preservatives and snack quality.
        </p>

      </div>

      <div class="guide-card">

        <h3>🥤 Scanner 2 — Drinks</h3>

        <p>
          Learn safe drink quantities and sugar limits.
        </p>

      </div>

      <div class="guide-card">

        <h3>🍟 Scanner 3 — Others</h3>

        <p>
          Explore fats, oils and processed food guidance.
        </p>

      </div>

    </div>

    <button class="btn primary" onclick="restart()">
      🔄 Check Another
    </button>

  </div>

</div>

<script>

/* TYPE EFFECT */

function typeText(el,text,speed=40){

  el.innerHTML='';

  let i=0;

  let interval=setInterval(()=>{

    el.innerHTML += text.charAt(i);

    i++;

    if(i>=text.length){

      clearInterval(interval);

    }

  },speed);

}

/* HOME TEXT */

typeText(

document.getElementById('homeText'),

'Welcome to PEAK Food Intelligence ✨ Analyze sugar, preservatives, ingredients and overall food quality using our modern smart assistant.'

);

/* QUESTIONS */

const questions=[

{
q:'Does it contain high sugar?',
emoji:'🍭'
},

{
q:'Is it highly packaged?',
emoji:'📦'
},

{
q:'Does it contain artificial ingredients?',
emoji:'🧪'
},

{
q:'Is it deep fried?',
emoji:'🍟'
},

{
q:'Does it contain preservatives?',
emoji:'⚠️'
}

];

let step=0;
let score=0;

/* START */

function start(){

  switchScreen('questions');

  nextQuestion();
}

/* NEXT QUESTION */

function nextQuestion(){

  let current=questions[step];

  mascotQ.innerHTML=current.emoji;

  typeText(questionText,current.q);

  progressBar.style.width=
  ((step/questions.length)*100)+'%';
}

/* ANSWER */

function answer(val){

  if(val===1){

    score++;
  }

  step++;

  if(step<questions.length){

    nextQuestion();

  }else{

    showResult();
  }
}

/* RESULT */

function showResult(){

  switchScreen('result');

  let title='';
  let msg='';
  let box='';

  if(score<=1){

    title='GOOD';

    msg='Great choice! This food appears healthy and balanced 🌿';

    box='result-good';

    mascotR.innerHTML='🌿';

  }else if(score<=3){

    title='LIMIT';

    msg='Consume occasionally and in moderate quantity ⚠️';

    box='result-limit';

    mascotR.innerHTML='⚠️';

  }else{

    title='AVOID';

    msg='This food may negatively affect health if consumed frequently 🚫';

    box='result-avoid';

    mascotR.innerHTML='🚫';
  }

  resultTitle.innerText=title;

  resultMsg.innerText=msg;

  resultBox.className='result-box '+box;
}

/* SWITCH SCREEN */

function switchScreen(id){

  document
  .querySelectorAll('.screen')
  .forEach(s=>s.classList.remove('active'));

  document
  .getElementById(id)
  .classList.add('active');
}

/* RESTART */

function restart(){

  step=0;

  score=0;

  progressBar.style.width='0%';

  switchScreen('home');
}

</script>

</body>
</html>
